<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARKB C2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.1.9/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.trunk.min.js"></script>

    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        div {
            background-color: rgba(0, 0, 0, 0.5);
            color: #fff;
            text-align: center;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        #address {
            font-family: monospace;
            font-size: 20px;
            cursor: pointer;
        }

        #copy {
            color: green;
            display: none;
        }

        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;
        }
    </style>
</head>

<body>


    <div>
        <h2>Your files have been encrypted...</h2>
        <p>You have 72 hours to pay x bitcoins to the address below to get your files back.</p>
        <p>Payment Reference: {{payment_ref}}</p>
        <p id="address">{{address}}</p>
        <p>Once paid, your files will be decrypted and restored to their original state within 24 hours.</p>
        <p id="copy">Address copied to clipboard</p>
    </div>

    <div id="bg"></div>
    <script>
        const address = document.getElementById("address");
        const copy = document.getElementById("copy");
        address.onclick = function () {
            navigator.clipboard.writeText(address.innerHTML);
            copy.style.display = "block";
            setTimeout(() => {
                copy.style.display = "none";
            }, 2000);
        }
        VANTA.TRUNK({
            el: "#bg",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x455998
        })
    </script>
</body>

</html>
